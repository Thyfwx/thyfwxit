<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI // TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5.3.0">
    <link rel="icon" type="image/png" href="https://thyfwxit.com/favicon.png">
</head>
<body class="crt-mode">

    <script>
        (function() {
            var user = JSON.parse(localStorage.getItem('nexus_user_data') || 'null');
            if (!user || !user.name) window.location.replace('./login.html');
        })();
    </script>

    <div class="monitor" id="main-monitor">
        <div class="screen-glare"></div>
        <div class="glass-panel">
            <header class="status-bar">
                <div class="status-item"><div id="conn-dot" class="conn-dot"></div> <span class="stat-label">USER</span> <span id="user-display">--</span></div>
                <div class="status-item"><span class="stat-label">NODE</span> <span id="node-display">CENTRAL_STATION</span></div>
                <div class="status-item status-title" id="status-title">NEXUS AI // CORE</div>
                <div class="status-item"><span class="stat-label">MODE</span> <span id="mode-indicator">NEXUS</span></div>
            </header>

            <main class="terminal-container">
                <div class="terminal-output" id="terminal-output"></div>
                <div class="terminal-input-wrapper">
                    <span class="prompt" id="prompt-label">guest@nexus:~$</span>
                    <input type="text" id="terminal-input" autocomplete="off" autofocus spellcheck="false">
                </div>
            </main>

            <aside class="quick-actions">
                <div id="auth-section" class="auth-section"></div>

                <div class="aside-header">GAMES</div>
                <button class="action-btn" data-cmd="play wordle">Wordle</button>
                <button class="action-btn" data-cmd="play snake">Snake</button>
                <button class="action-btn" data-cmd="play pong">Pong</button>

                <div class="aside-header" style="margin-top:15px;">NEURAL LINKS</div>
                <div class="mode-picker">
                    <button class="mode-btn active" data-mode="nexus"     title="Standard Interface">Nexus</button>
                    <button class="mode-btn"         data-mode="shadow"    title="Unfiltered Mode">Unfiltered</button>
                    <button class="mode-btn"         data-mode="coder"     title="Architect Mode (Code)">Coder</button>
                    <button class="mode-btn"         data-mode="education" title="Mentor Mode (Instructional)" style="border-color:#00ffcc;color:#00ffcc;">Education</button>
                </div>

                <div class="aside-header" style="margin-top:15px;">TOOLS</div>
                <button class="action-btn" onclick="startMaintenanceHub()">Maintenance Hub</button>
                <button class="action-btn" onclick="startSpeedTest()">Speed Test</button>
                <button class="action-btn" id="btn-logs" data-cmd="logs" style="display:none;">Logs</button>
                <button class="action-btn" id="btn-rankings" data-cmd="leaderboard">Rankings</button>
                <button class="action-btn" data-cmd="type test">Type Test</button>
                <button class="action-btn" data-cmd="matrix">Matrix</button>
                <button class="action-btn" data-cmd="monitor">Monitor</button>
                <button class="action-btn" data-cmd="help">Help</button>
                <button class="action-btn" data-cmd="clear">Clear</button>

                <button class="a11y-open-btn" onclick="toggleA11yPanel()" title="Accessibility settings" style="margin-top:auto;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right:4px;">
                        <path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z"/>
                    </svg>
                    ACCESSIBILITY
                </button>
            </aside>

            <div id="game-gui-container" class="gui-hidden">
                <div id="gui-header"><span id="gui-title">SYSTEM</span><button id="gui-close">X</button></div>
                <div id="gui-content-wrapper">
                    <div id="gui-content"></div>
                    <canvas id="nexus-canvas" width="400" height="360" style="display:none;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Neural Override (Hack Menu) -->
    <div id="hack-menu" class="modal-overlay" style="display:none;">
        <div class="modal-box hack-box">
            <h3 class="modal-header">NEURAL OVERRIDE // ACTIVE</h3>
            <div class="modal-body">
                <div class="hack-section">
                    <span class="terms-label">[ STEALTH PROTOCOL ]</span>
                    <p>Disabling this node's external uplink prevents all telemetry and session logging.</p>
                    <button class="gui-btn" id="stealth-toggle" onclick="toggleStealthMode()">ENABLE STEALTH</button>
                </div>
                <div class="hack-section" style="margin-top:20px;">
                    <span class="terms-label">[ CORE ACCESS ]</span>
                    <p>Root privileges for neural link adjustment.</p>
                    <button class="gui-btn" onclick="printToTerminal('[ROOT] Access Granted.', 'conn-ok')">GRANT PRIVILEGES</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="gui-btn" onclick="document.getElementById('hack-menu').style.display='none'">CLOSE OVERRIDE</button>
            </div>
        </div>
    </div>

    <script src="nexus_globals.js?v=5.3.0"></script>
    <script src="nexus_brain.js?v=5.3.0"></script>
    <script src="config_core.js?v=5.3.0"></script>
    <script src="modules/speedtest_logic.js?v=5.3.0"></script>
    <script src="modules/hardware_logic.js?v=5.3.0"></script>
    <script src="uplink_core.js?v=5.3.0"></script>
    <script src="stats_core.js?v=5.3.0"></script>
    <script src="audio_core.js?v=5.3.0"></script>
    <script src="games_core.js?v=5.3.0"></script>
    <script src="auth_core.js?v=5.3.0"></script>
    <script src="ai_core.js?v=5.3.0"></script>
    <script src="commands_core.js?v=5.3.0"></script>
    <script src="terminal.js?v=5.3.0"></script>
</body>
</html>

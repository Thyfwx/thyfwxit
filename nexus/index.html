<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Web Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="monitor">
        <div class="screen-glare"></div>
        <div class="glass-panel">
            <header class="status-bar">
                <div class="status-item">CPU: <span id="cpu-stat">--</span></div>
                <div class="status-item">MEM: <span id="mem-stat">--</span></div>
                <div class="status-item">BAT: <span id="bat-stat">--</span></div>
                <div class="status-item geo-stat">LOC: Locating...</div>
            </header>
            
            <main class="terminal-container">
                <div class="terminal-output" id="terminal-output">
                    <p class="sys-msg">Initializing NEXUS kernel...</p>
                    <p class="sys-msg">Establishing uplink to central node...</p>
                    <p class="sys-msg">WebSockets Connected.</p>
                </div>
                <div class="terminal-input-wrapper">
                    <span class="prompt">root@nexus:~#</span>
                    <input type="text" id="terminal-input" autocomplete="off" autofocus>
                </div>
            </main>

            <aside class="quick-actions">
                <button class="action-btn" data-cmd="speedtest">Speedtest</button>
                <button class="action-btn" data-cmd="help">Help</button>
                <button class="action-btn" data-cmd="clear">Clear</button>
            </aside>
            
            <div id="game-gui-container" class="gui-hidden">
                <div id="gui-header">
                    <span id="gui-title">8-BIT SYSTEM</span>
                    <button id="gui-close">X</button>
                </div>
                <div id="gui-content"></div>
            </div>
        </div>
    </div>
    <script src="terminal.js"></script>
</body>
</html>
